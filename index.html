<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Clicker Game</title>
    <!-- Підключаємо бібліотеку Supabase -->
    <script src="https://jsdelivr.net"></script>
    
    <style>
        :root { --bg: #1a1a1a; --card-bg: #2a2a2a; --gold: #ffcc00; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; text-align: center; user-select: none; }
        .hidden { display: none !important; }
        
        /* Шапка */
        header { display: flex; justify-content: space-around; padding: 15px; background: #252525; border-bottom: 2px solid var(--gold); }
        .stat-box { font-size: 18px; font-weight: bold; }

        /* Гра */
        #click-circle {
            width: 200px; height: 200px; background: radial-gradient(circle, #fbc02d, #f57f17);
            border-radius: 50%; margin: 50px auto; position: relative;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.4); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 80px;
            transition: transform 0.05s;
        }
        #click-circle:active { transform: scale(0.92); }

        /* Картки */
        .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; padding-bottom: 80px; }
        .card { background: var(--card-bg); border-radius: 12px; height: 160px; overflow: hidden; border: 1px solid #444; position: relative; }
        .card-header { height: 30px; font-size: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; color: black; }
        .card-emoji { font-size: 50px; margin-top: 20px; }
        .card-count { position: absolute; bottom: 5px; right: 10px; font-size: 12px; color: #aaa; }

        /* Навігація */
        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #252525; height: 65px; border-top: 1px solid #444; }
        .nav-btn { flex: 1; border: none; background: none; color: white; cursor: pointer; font-size: 11px; }

        /* Анімація вильоту цифр */
        .float-text { position: absolute; color: var(--gold); font-weight: bold; pointer-events: none; animation: floatUp 0.6s ease-out forwards; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }

        .main-btn { background: var(--gold); border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="stat-box">💰 <span id="balance">0</span></div>
        <div class="stat-box">⭐ Рівень: <span id="level">1</span></div>
    </header>

    <!-- Екрани -->
    <section id="scr-game">
        <div id="click-circle">🔘</div>
        <p>Клікай для заробітку!</p>
    </section>

    <section id="scr-shop" class="hidden">
        <h2>Магазин кейсів</h2>
        <button class="main-btn" onclick="openCase()">Відкрити кейс (100 💰)</button>
        <div id="reward-out"></div>
    </section>

    <section id="scr-cards" class="hidden">
        <h2>Твої картки</h2>
        <div id="inventory" class="cards-grid"></div>
    </section>

    <section id="scr-market" class="hidden">
        <h2>Маркет</h2>
        <p>Тут можна буде купувати картки інших гравців</p>
        <div id="market-list" class="cards-grid"></div>
    </section>

    <nav>
        <button class="nav-btn" onclick="show('game')">🎮 ГРА</button>
        <button class="nav-btn" onclick="show('shop')">📦 КЕЙСИ</button>
        <button class="nav-btn" onclick="show('cards')">🃏 КАРТКИ</button>
        <button class="nav-btn" onclick="show('market')">🛒 МАРКЕТ</button>
    </nav>

    <script>
        // ДАНІ SUPABASE
        const SB_URL = 'https://cpxgsklvgzxplqidqtzx.supabase.co';
        const SB_KEY = 'sb_publishable_2Diasnju3zsuDNJa-iLk4Q'; 
        const supabase = typeof supabase !== 'undefined' ? supabase.createClient(SB_URL, SB_KEY) : null;

        let balance = 0;
        let level = 1;
        let xp = 0;
        let myCards = {};

        const characters = [
            { n: "Нічого", p: 33, e: "💨", c: "#777" },
            { n: "30-75 монет", p: 10, e: "💰", c: "#FFD700" },
            { n: "Нищий", p: 20, e: "🏚️", c: "#8B4513" },
            { n: "Гоблін", p: 10, e: "👺", c: "#228B22" },
            { n: "Дворф", p: 9, e: "⛏️", c: "#4682B4" },
            { n: "Лицар", p: 6, e: "🛡️", c: "#C0C0C0" },
            { n: "Маг Світла", p: 5, e: "✨", c: "#FFFACD" },
            { n: "Король", p: 4.5, e: "👑", c: "#FF8C00" },
            { n: "Дракон", p: 2, e: "🐉", c: "#B22222" },
            { n: "Серце життя", p: 0.5, e: "❤️", c: "#FF1493" }
        ];

        // КЛІКЕР
        document.getElementById('click-circle').onclick = function(e) {
            let add = level; // +1 монета за кожен рівень
            balance += add;
            xp++;
            
            // Система рівнів (макс 10)
            if (xp >= level * 50 && level < 10) {
                level++;
                xp = 0;
                alert("Новий рівень: " + level);
            }

            // Анімація кліку
            const ft = document.createElement('div');
            ft.className = 'float-text';
            ft.innerText = '+' + add;
            ft.style.left = e.pageX + 'px';
            ft.style.top = e.pageY + 'px';
            document.body.appendChild(ft);
            setTimeout(() => ft.remove(), 600);

            updateUI();
        };

        // ВІДКРИТТЯ КЕЙСУ
        function openCase() {
            if (balance < 100) return alert("Мало монет!");
            balance -= 100;

            let r = Math.random() * 100;
            let curr = 0;
            let win = characters[0];

            for (let c of characters) {
                curr += c.p;
                if (r <= curr) { win = c; break; }
            }

            if (win.n === "30-75 монет") {
                let m = Math.floor(Math.random() * 45) + 30;
                balance += m;
                document.getElementById('reward-out').innerHTML = "Ви виграли " + m + " 💰";
            } else if (win.n !== "Нічого") {
                if (!myCards[win.n]) myCards[win.n] = { ...win, count: 0 };
                if (myCards[win.n].count < 99) myCards[win.n].count++;
                document.getElementById('reward-out').innerHTML = `Випало: ${win.e} ${win.n}`;
                renderCards();
            } else {
                document.getElementById('reward-out').innerHTML = "Пусто... 💨";
            }
            updateUI();
        }

        function renderCards() {
            const container = document.getElementById('inventory');
            container.innerHTML = "";
            for (let key in myCards) {
                let c = myCards[key];
                container.innerHTML += `
                    <div class="card">
                        <div class="card-header" style="background:${c.c}">${c.n}</div>
                        <div class="card-emoji">${c.e}</div>
                        <div class="card-count">${c.count}/99</div>
                    </div>
                `;
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance;
            document.getElementById('level').innerText = level;
        }

        function show(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('scr-' + id).classList.remove('hidden');
        }
    </script>
</body>
</html>
