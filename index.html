<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Crystal Clicker</title>
    <script src="https://unpkg.com"></script>
    <style>
        :root {
            --bg: #0b0e14; --panel: #161b22; --accent: #00d2ff; --gold: #ffc400; --red: #ff4d4d;
        }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }
        
        header { padding: 15px; display: flex; justify-content: space-around; background: #161b22; border-bottom: 1px solid #30363d; }
        .stat-val { font-size: 20px; font-weight: 900; color: var(--accent); display: block; }
        .stat-label { font-size: 9px; color: #8b949e; text-transform: uppercase; }

        /* Кристал */
        .click-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #main-crystal {
            width: 180px; height: 180px; background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            clip-path: polygon(50% 0%, 90% 20%, 100% 60%, 75% 100%, 25% 100%, 0% 60%, 10% 20%);
            display: flex; align-items: center; justify-content: center; font-size: 50px; cursor: pointer;
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.3); transition: transform 0.05s;
        }
        #main-crystal:active { transform: scale(0.9); }

        /* Рулетка */
        #case-roulette { width: 90%; height: 100px; background: #0d1117; border: 2px solid #30363d; margin: 20px auto; position: relative; overflow: hidden; display: flex; align-items: center; border-radius: 10px; }
        #roulette-inner { display: flex; position: absolute; left: 50%; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        .item-box { min-width: 80px; height: 80px; background: #161b22; margin: 0 5px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; border-bottom: 3px solid #333; }

        /* Списки та картки */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; overflow-y: auto; padding-bottom: 90px; }
        .card { background: var(--panel); border-radius: 12px; border: 1px solid #30363d; overflow: hidden; text-align: center; padding-bottom: 10px; }
        .card-header { padding: 5px; font-size: 10px; font-weight: bold; color: #000; text-transform: uppercase; }
        .card-btn { background: var(--accent); border: none; border-radius: 5px; padding: 5px 10px; font-size: 10px; font-weight: bold; margin-top: 5px; cursor: pointer; color: #000; }

        /* Навігація */
        nav { position: fixed; bottom: 0; width: 100%; background: #161b22; height: 65px; display: flex; border-top: 1px solid #30363d; z-index: 100; }
        .nav-btn { flex: 1; border: none; background: none; color: #8b949e; font-size: 9px; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
        .nav-btn.active { color: var(--accent); }

        .leader-item { display: flex; justify-content: space-between; padding: 12px; background: var(--panel); margin: 5px 15px; border-radius: 8px; border-left: 4px solid var(--accent); }
        .float-n { position: absolute; font-weight: 900; color: var(--accent); pointer-events: none; animation: floatUp 0.7s forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }
        .hidden { display: none !important; }
        .main-btn { width: 90%; padding: 15px; background: var(--accent); border: none; border-radius: 10px; font-weight: 900; cursor: pointer; margin: 10px auto; display: block; }
    </style>
</head>
<body>

<header>
    <div align="center"><span class="stat-label">💰 Монети</span><span class="stat-val" id="balance">0</span></div>
    <div align="center"><span class="stat-label">⭐ Рівень</span><span class="stat-val" id="level">1</span></div>
</header>

<main style="flex:1; overflow:hidden; display:flex; flex-direction:column;">
    <!-- ГРА -->
    <section id="scr-game" class="screen click-container">
        <div id="main-crystal">💎</div>
        <p style="color:#555; font-size:12px">Клікай, щоб отримати +<span id="click-pwr">1</span></p>
    </section>

    <!-- КЕЙСИ -->
    <section id="scr-shop" class="screen hidden">
        <h2 align="center">Магазин Кейсів</h2>
        <div id="case-roulette">
            <div style="position:absolute; left:50%; top:0; bottom:0; width:2px; background:var(--accent); z-index:2; transform:translateX(-50%);"></div>
            <div id="roulette-inner"></div>
        </div>
        <button class="main-btn" onclick="startRoll()">ВІДКРИТИ ЗА 100 💰</button>
        <div id="roll-res" align="center" style="color:var(--gold); font-weight:bold"></div>
    </section>

    <!-- МАРКЕТ -->
    <section id="scr-market" class="screen hidden">
        <h3 style="margin-left:20px">🛒 Маркет (Лотів: <span id="lot-count">0</span>/3)</h3>
        <div id="market-list" class="grid">
            <p style="grid-column: 1/3; color:#555; text-align:center">Тут будуть товари інших гравців</p>
        </div>
        <h3 style="margin-left:20px">📦 Твої активні лоти</h3>
        <div id="my-lots" style="padding: 0 15px;"></div>
    </section>

    <!-- КАРТКИ -->
    <section id="scr-cards" class="screen hidden">
        <h3 style="margin-left:20px">🃏 Твоя колекція (макс 99)</h3>
        <div id="inventory" class="grid"></div>
    </section>

    <!-- ЛІДЕРБОРД -->
    <section id="scr-leader" class="screen hidden">
        <h3 style="margin-left:20px">🏆 Топ гравців</h3>
        <div id="leaderboard-list">
            <div class="leader-item"><span>1. Кріпто-Король</span><span>999,999 💰</span></div>
            <div class="leader-item"><span>2. Ти</span><span id="my-rank">0 💰</span></div>
        </div>
    </section>
</main>

<nav>
    <button class="nav-btn active" onclick="show('game', this)"><span>🎮</span>ГРА</button>
    <button class="nav-btn" onclick="show('shop', this)"><span>📦</span>КЕЙСИ</button>
    <button class="nav-btn" onclick="show('market', this)"><span>🛒</span>МАРКЕТ</button>
    <button class="nav-btn" onclick="show('cards', this)"><span>🃏</span>КАРТКИ</button>
    <button class="nav-btn" onclick="show('leader', this)"><span>🏆</span>ТОП</button>
</nav>

<script>
    // Встав сюди свої ключі Supabase
    const SB_URL = 'https://cpxgsklvgzxplqidqtzx.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; 
    const supabase = window.supabase ? window.supabase.createClient(SB_URL, SB_KEY) : null;

    let balance = parseInt(localStorage.getItem('balance')) || 0;
    let level = parseInt(localStorage.getItem('level')) || 1;
    let xp = parseInt(localStorage.getItem('xp')) || 0;
    let myCards = JSON.parse(localStorage.getItem('myCards')) || {};
    let myLots = JSON.parse(localStorage.getItem('myLots')) || [];

    const items = [
        { n: "Нічого", p: 33, e: "💨", c: "#94a3b8" },
        { n: "50 монет", p: 10, e: "💰", c: "#fbbf24" },
        { n: "Нищий", p: 20, e: "🏚️", c: "#78350f" },
        { n: "Гоблін", p: 10, e: "👺", c: "#22c55e" },
        { n: "Дворф", p: 9, e: "⛏️", c: "#3b82f6" },
        { n: "Лицар", p: 6, e: "🛡️", c: "#94a3b8" },
        { n: "Маг Світла", p: 5, e: "✨", c: "#fde047" },
        { n: "Король", p: 4.5, e: "👑", c: "#f59e0b" },
        { n: "Дракон", p: 2, e: "🐉", c: "#ef4444" },
        { n: "Серце життя", p: 0.5, e: "❤️", c: "#ec4899" }
    ];

    // КЛІКЕР
    document.getElementById('main-crystal').addEventListener('pointerdown', (e) => {
        balance += level;
        xp++;
        if (xp >= level * 100 && level < 10) { level++; xp = 0; }
        
        const num = document.createElement('div');
        num.className = 'float-n'; num.innerText = `+${level}`;
        num.style.left = e.clientX + 'px'; num.style.top = e.clientY + 'px';
        document.body.appendChild(num);
        setTimeout(() => num.remove(), 700);
        updateUI();
        save();
    });

    // РУЛЕТКА
    function startRoll() {
        if (balance < 100) return alert("Мало монет!");
        balance -= 100;
        updateUI();
        
        const inner = document.getElementById('roulette-inner');
        inner.style.transition = 'none';
        inner.style.transform = 'translateX(0)';
        inner.innerHTML = '';
        
        let pool = [];
        for(let i=0; i<45; i++) {
            let rand = Math.random()*100, cur=0, winItem = items[0];
            for(let it of items){ cur+=it.p; if(rand<=cur){winItem=it; break;} }
            pool.push(winItem);
            inner.innerHTML += `<div class="item-box" style="border-color:${winItem.c}"><span>${winItem.e}</span><br>${winItem.n}</div>`;
        }

        const winIndex = 38;
        const result = pool[winIndex];

        setTimeout(() => {
            inner.style.transition = 'transform 4s cubic-bezier(0.15, 0, 0.15, 1)';
            const move = (winIndex * 90) - (inner.parentElement.offsetWidth / 2) + 45;
            inner.style.transform = `translateX(-${move}px)`;
        }, 50);

        setTimeout(() => {
            if(result.n.includes("монет")) balance += 50;
            else if(result.n !== "Нічого") {
                if((myCards[result.n] || 0) < 99) myCards[result.n] = (myCards[result.n] || 0) + 1;
            }
            document.getElementById('roll-res').innerText = `ВИПАЛО: ${result.n} ${result.e}`;
            updateUI(); save();
        }, 4100);
    }

    // МАРКЕТ
    function listToMarket(name) {
        if (myLots.length >= 3) return alert("Максимум 3 лоти!");
        let price = prompt("Ціна (1-99999):", "100");
        price = parseInt(price);
        if (!price || price < 1 || price > 99999) return;

        myCards[name]--;
        if (myCards[name] <= 0) delete myCards[name];
        myLots.push({ n: name, p: price, id: Date.now() });
        updateUI(); save();
    }

    function removeLot(id) {
        let lot = myLots.find(l => l.id === id);
        myCards[lot.n] = (myCards[lot.n] || 0) + 1;
        myLots = myLots.filter(l => l.id !== id);
        updateUI(); save();
    }

    function updateUI() {
        document.getElementById('balance').innerText = balance;
        document.getElementById('level').innerText = level;
        document.getElementById('click-pwr').innerText = level;
        document.getElementById('lot-count').innerText = myLots.length;
        document.getElementById('my-rank').innerText = balance + " 💰";

        const inv = document.getElementById('inventory');
        inv.innerHTML = '';
        for (let n in myCards) {
            let info = items.find(i => i.n === n);
            inv.innerHTML += `<div class="card">
                <div class="card-header" style="background:${info.c}">${n}</div>
                <div style="font-size:30px; padding:10px">${info.e}</div>
                <div style="font-size:10px; color:#8b949e">Кількість: ${myCards[n]}</div>
                <button class="card-btn" onclick="listToMarket('${n}')">ПРОДАТИ</button>
            </div>`;
        }

        const myLotsDiv = document.getElementById('my-lots');
        myLotsDiv.innerHTML = '';
        myLots.forEach(l => {
            myLotsDiv.innerHTML += `<div class="leader-item" style="border-left-color:var(--red)">
                <span>${l.n} (Ціна: ${l.p})</span>
                <button onclick="removeLot(${l.id})" style="background:var(--red); border:none; color:#fff; border-radius:4px; font-size:10px; padding:4px 8px">ЗНЯТИ</button>
            </div>`;
        });
    }

    function save() {
        localStorage.setItem('balance', balance);
        localStorage.setItem('level', level);
        localStorage.setItem('myCards', JSON.stringify(myCards));
        localStorage.setItem('myLots', JSON.stringify(myLots));
    }

    function show(id, btn) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('scr-' + id).classList.remove('hidden');
        btn.classList.add('active');
        updateUI();
    }

    updateUI();
</script>
</body>
</html>
