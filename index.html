<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crystal Clicker Online</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --bg: #0b0e14; --panel: #161b22; --accent: #00d2ff; --gold: #ffc400; --red: #ff4d4d; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }
        header { padding: 15px; display: flex; justify-content: space-around; background: #161b22; border-bottom: 1px solid #30363d; }
        .stat-val { font-size: 20px; font-weight: 900; color: var(--accent); display: block; }
        .stat-label { font-size: 9px; color: #8b949e; text-transform: uppercase; }
        .screen { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .hidden { display: none !important; }
        
        /* Кристал */
        .click-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        #main-crystal { 
            width: 180px; height: 180px; background: linear-gradient(135deg, #00d2ff, #3a7bd5); 
            clip-path: polygon(50% 0%, 90% 20%, 100% 60%, 75% 100%, 25% 100%, 0% 60%, 10% 20%); 
            font-size: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s;
        }
        #main-crystal:active { transform: scale(0.9); }

        /* Картки */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .card { background: var(--panel); border-radius: 12px; border: 1px solid #30363d; text-align: center; padding-bottom: 10px; overflow: hidden; }
        .card-header { padding: 5px; font-size: 10px; font-weight: bold; color: #000; text-transform: uppercase; }
        .btn { background: var(--accent); border: none; border-radius: 5px; padding: 8px; font-size: 10px; font-weight: bold; cursor: pointer; width: 85%; margin-top: 5px; color: #000; }
        
        /* Лідерборд */
        .leader-item { display: flex; justify-content: space-between; padding: 12px; background: var(--panel); margin: 5px 15px; border-radius: 8px; border-left: 4px solid var(--accent); }
        
        /* Рулетка */
        #case-roulette { width: 90%; height: 100px; background: #0d1117; border: 2px solid #30363d; margin: 20px auto; position: relative; overflow: hidden; display: flex; align-items: center; border-radius: 10px; }
        #roulette-inner { display: flex; position: absolute; left: 50%; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        .item-box { min-width: 80px; height: 80px; background: #161b22; margin: 0 5px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; border-bottom: 3px solid #333; }

        nav { position: fixed; bottom: 0; width: 100%; background: #161b22; height: 65px; display: flex; border-top: 1px solid #30363d; }
        .nav-btn { flex: 1; border: none; background: none; color: #8b949e; font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
        .nav-btn.active { color: var(--accent); }

        .float-n { position: absolute; font-weight: 900; color: var(--accent); pointer-events: none; animation: floatUp 0.7s forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }
    </style>
</head>
<body>

<header>
    <div align="center"><span class="stat-label">💰 Баланс</span><span class="stat-val" id="balance">0</span></div>
    <div align="center"><span class="stat-label">⭐ Рівень</span><span class="stat-val" id="level">1</span></div>
</header>

<main style="flex:1; position:relative;">
    <section id="scr-game" class="screen click-container">
        <div id="main-crystal">💎</div>
        <p style="color:#444; font-size:12px; margin-top:10px;">Клікай на кристал!</p>
    </section>

    <section id="scr-shop" class="screen hidden">
        <h3 align="center">📦 Відкрити Кейс</h3>
        <div id="case-roulette"><div id="roulette-inner"></div></div>
        <div align="center"><button class="btn" style="width:80%; padding:15px;" onclick="startRoll()">ВІДКРИТИ (100 💰)</button></div>
        <div id="roll-res" align="center" style="margin-top:15px; color:var(--gold); font-weight:bold;"></div>
    </section>

    <section id="scr-market" class="screen hidden">
        <h3 align="center">🛒 Глобальний Маркет</h3>
        <div id="market-list" class="grid"></div>
    </section>

    <section id="scr-cards" class="screen hidden">
        <h3 align="center">🃏 Твої Картки</h3>
        <div id="inventory" class="grid"></div>
    </section>

    <section id="scr-leader" class="screen hidden">
        <h3 align="center">🏆 Топ Гравців</h3>
        <div id="leaderboard-list"></div>
    </section>
</main>

<nav>
    <button class="nav-btn active" onclick="show('game', this)">ГРА</button>
    <button class="nav-btn" onclick="show('shop', this)">КЕЙСИ</button>
    <button class="nav-btn" onclick="show('market', this)">МАРКЕТ</button>
    <button class="nav-btn" onclick="show('cards', this)">КАРТКИ</button>
    <button class="nav-btn" onclick="show('leader', this)">ТОП</button>
</nav>

<script>
    const SB_URL = 'https://cpxgsklvgzxplqidqtzx.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNweGdza2x2Z3p4cGxxaWRxdHp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNDY4ODYsImV4cCI6MjA5MjYyMjg4Nn0.rASq8yPzzjbXCOqsYON8Jx2Pq9PeRq2GbIYOc3UGFXM'; // Твій ключ

    const supabase = window.supabase.createClient(SB_URL, SB_KEY);
    let userId = localStorage.getItem('userId') || 'u' + Math.floor(Math.random()*1000000);
    localStorage.setItem('userId', userId);

    let balance = 0, level = 1, myCards = {};

    const items = [
        { n: "Нічого", p: 33, e: "💨", c: "#94a3b8" }, { n: "Гоблін", p: 10, e: "👺", c: "#22c55e" },
        { n: "Дворф", p: 9, e: "⛏️", c: "#3b82f6" }, { n: "Лицар", p: 6, e: "🛡️", c: "#94a3b8" },
        { n: "Король", p: 4, e: "👑", c: "#f59e0b" }, { n: "Дракон", p: 2, e: "🐉", c: "#ef4444" },
        { n: "Серце життя", p: 0.5, e: "❤️", c: "#ec4899" }
    ];

    // ЗАВАНТАЖЕННЯ ДАНИХ ПРИ СТАРТІ
    async function loadUserData() {
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', userId).single();
        if (profile) { balance = profile.balance; level = profile.level; }
        
        const { data: cards } = await supabase.from('user_cards').select('*').eq('user_id', userId);
        if (cards) cards.forEach(c => myCards[c.char_name] = c.quantity);
        updateUI();
    }

    // КЛІКЕР
    document.getElementById('main-crystal').addEventListener('pointerdown', (e) => {
        balance += level; updateUI();
        supabase.from('profiles').upsert({ id: userId, balance: balance, level: level });
        
        const num = document.createElement('div');
        num.className = 'float-n'; num.innerText = `+${level}`;
        num.style.left = e.clientX + 'px'; num.style.top = e.clientY + 'px';
        document.body.appendChild(num);
        setTimeout(() => num.remove(), 700);
    });

    // РУЛЕТКА ТА ЗБЕРЕЖЕННЯ КАРТКИ
    function startRoll() {
        if (balance < 100) return alert("Мало монет!");
        balance -= 100; updateUI();
        
        const inner = document.getElementById('roulette-inner');
        inner.style.transition = 'none'; inner.style.transform = 'translateX(0)'; inner.innerHTML = '';
        let pool = [];
        for(let i=0; i<45; i++) {
            let rand = Math.random()*100, cur=0, winItem = items[0];
            for(let it of items){ cur+=it.p; if(rand<=cur){winItem=it; break;} }
            pool.push(winItem);
            inner.innerHTML += `<div class="item-box" style="border-color:${winItem.c}"><span>${winItem.e}</span><br>${winItem.n}</div>`;
        }
        const winItem = pool[38];
        setTimeout(() => {
            inner.style.transition = 'transform 4s cubic-bezier(0.15, 0, 0.15, 1)';
            const move = (38 * 90) - (inner.parentElement.offsetWidth / 2) + 45;
            inner.style.transform = `translateX(-${move}px)`;
        }, 50);

        setTimeout(async () => {
            if(winItem.n !== "Нічого") {
                myCards[winItem.n] = (myCards[winItem.n] || 0) + 1;
                await supabase.from('user_cards').upsert({ user_id: userId, char_name: winItem.n, quantity: myCards[winItem.n] }, { onConflict: 'user_id, char_name' });
            }
            document.getElementById('roll-res').innerText = `ВИПАЛО: ${winItem.n}`;
            updateUI(); supabase.from('profiles').upsert({ id: userId, balance: balance });
        }, 4100);
    }

    async function listToMarket(name) {
        let price = prompt("Ціна продажу:", "100");
        if (!price || price < 1) return;
        myCards[name]--;
        await supabase.from('user_cards').update({ quantity: myCards[name] }).eq('user_id', userId).eq('char_name', name);
        if (myCards[name] <= 0) { delete myCards[name]; await supabase.from('user_cards').delete().eq('user_id', userId).eq('char_name', name); }
        await supabase.from('market').insert({ seller_id: userId, char_name: name, price: parseInt(price) });
        updateUI();
    }

    async function buyFromMarket(lotId, price, sellerId, name) {
        if (sellerId === userId || balance < price) return alert("Помилка");
        balance -= price;
        const { error } = await supabase.from('market').delete().eq('id', lotId);
        if (!error) {
            myCards[name] = (myCards[name] || 0) + 1;
            await supabase.from('user_cards').upsert({ user_id: userId, char_name: name, quantity: myCards[name] }, { onConflict: 'user_id, char_name' });
            updateUI();
        }
    }

    async function loadMarket() {
        const { data } = await supabase.from('market').select('*');
        document.getElementById('market-list').innerHTML = data.map(l => {
            let info = items.find(i => i.n === l.char_name);
            return `<div class="card"><div class="card-header" style="background:${info.c}">${l.char_name}</div><div style="font-size:30px; padding:10px">${info.e}</div><div>${l.price} 💰</div><button class="btn" onclick="buyFromMarket(${l.id}, ${l.price}, '${l.seller_id}', '${l.char_name}')">КУПИТИ</button></div>`;
        }).join('');
    }

    async function loadLeaderboard() {
        const { data } = await supabase.from('profiles').select('*').order('balance', { ascending: false }).limit(10);
        document.getElementById('leaderboard-list').innerHTML = data.map((p, i) => `<div class="leader-item"><span>${i+1}. ${p.id.slice(-5)}</span><span>${p.balance} 💰</span></div>`).join('');
    }

    function updateUI() {
        document.getElementById('balance').innerText = balance;
        document.getElementById('level').innerText = level;
        document.getElementById('inventory').innerHTML = Object.keys(myCards).map(n => {
            let info = items.find(i => i.n === n);
            return `<div class="card"><div class="card-header" style="background:${info.c}">${n}</div><div style="font-size:30px; padding:10px">${info.e}</div><div style="font-size:10px">К-сть: ${myCards[n]}</div><button class="btn" onclick="listToMarket('${n}')">ПРОДАТИ</button></div>`;
        }).join('');
    }

    function show(id, btn) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('scr-' + id).classList.remove('hidden');
        btn.classList.add('active');
        if (id === 'leader') loadLeaderboard(); if (id === 'market') loadMarket();
    }

    loadUserData();
</script>
</body>
</html>
