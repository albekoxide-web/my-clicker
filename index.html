<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Crystal Clicker</title>
    <!-- ПРАВИЛЬНЕ ПІДКЛЮЧЕННЯ SUPABASE -->
    <script src="https://unpkg.com"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --panel: #161b22;
            --accent: #00d2ff;
            --gold: #ffc400;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        header {
            padding: 20px;
            display: flex;
            justify-content: space-around;
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #30363d;
        }

        .stat-val { font-size: 22px; font-weight: 900; color: var(--accent); display: block; }
        .stat-label { font-size: 10px; color: #8b949e; text-transform: uppercase; }

        .click-container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        
        #main-crystal {
            width: 200px; height: 200px;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            clip-path: polygon(50% 0%, 90% 20%, 100% 60%, 75% 100%, 25% 100%, 0% 60%, 10% 20%);
            display: flex; align-items: center; justify-content: center;
            font-size: 60px; cursor: pointer;
            box-shadow: 0 0 50px rgba(0, 210, 255, 0.3);
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid rgba(255,255,255,0.2);
        }

        #main-crystal:active { transform: scale(0.9); }

        #case-roulette {
            width: 100%; height: 120px; background: #0d1117;
            border: 2px solid #30363d; margin: 20px 0;
            position: relative; overflow: hidden; display: flex; align-items: center;
        }

        #roulette-inner { display: flex; position: absolute; left: 50%; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }

        .item-box {
            min-width: 100px; height: 100px; background: #161b22;
            margin: 0 5px; border-radius: 10px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-size: 12px; border-bottom: 4px solid #333;
        }

        .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; overflow-y: auto; padding-bottom: 100px; }
        .card { background: var(--panel); border-radius: 15px; border: 1px solid #30363d; overflow: hidden; }
        .card-header { padding: 5px; font-size: 10px; font-weight: bold; text-align: center; color: #000; }

        nav { position: fixed; bottom: 0; width: 100%; background: #161b22; height: 70px; display: flex; border-top: 1px solid #30363d; }
        .nav-btn { flex: 1; border: none; background: none; color: #8b949e; font-size: 11px; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer; }
        .nav-btn.active { color: var(--accent); }

        .float-n { position: absolute; font-weight: 900; color: var(--accent); pointer-events: none; animation: floatUp 0.8s ease-out forwards; z-index: 100; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px) scale(1.5); } }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div align="center"><span class="stat-label">Монети</span><span class="stat-val" id="balance">0</span></div>
    <div align="center"><span class="stat-label">Рівень</span><span class="stat-val" id="level">1</span></div>
</header>

<main style="flex:1; display:flex; flex-direction:column;">
    <section id="scr-game" class="screen click-container">
        <div id="main-crystal">💎</div>
    </section>

    <section id="scr-shop" class="screen hidden" style="padding: 20px;">
        <h2>Магазин Кейсів</h2>
        <div id="case-roulette">
            <div style="position:absolute; left:50%; top:0; bottom:0; width:2px; background:var(--accent); z-index:2; transform:translateX(-50%);"></div>
            <div id="roulette-inner"></div>
        </div>
        <button onclick="startRoll()" id="btn-roll" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:10px; font-weight:900; cursor:pointer;">ВІДКРИТИ (100 💰)</button>
    </section>

    <section id="scr-cards" class="screen hidden cards-grid"></section>
</main>

<nav>
    <button class="nav-btn active" onclick="show('game', this)"><span>🎮</span>ГРА</button>
    <button class="nav-btn" onclick="show('shop', this)"><span>📦</span>КЕЙСИ</button>
    <button class="nav-btn" onclick="show('cards', this)"><span>🃏</span>КАРТКИ</button>
</nav>

<script>
    // ВСТАВ СВОЇ КЛЮЧІ ТУТ
    const SB_URL = 'https://cpxgsklvgzxplqidqtzx.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // Твій ANON KEY
    const supabase = window.supabase ? window.supabase.createClient(SB_URL, SB_KEY) : null;

    let balance = parseInt(localStorage.getItem('balance')) || 0;
    let level = parseInt(localStorage.getItem('level')) || 1;
    let xp = parseInt(localStorage.getItem('xp')) || 0;
    let myCards = JSON.parse(localStorage.getItem('myCards')) || {};

    const items = [
        { n: "Нічого", p: 33, e: "💨", c: "#94a3b8" },
        { n: "50 монет", p: 10, e: "💰", c: "#fbbf24" },
        { n: "Нищий", p: 20, e: "🏚️", c: "#78350f" },
        { n: "Гоблін", p: 10, e: "👺", c: "#22c55e" },
        { n: "Дворф", p: 9, e: "⛏️", c: "#3b82f6" },
        { n: "Лицар", p: 6, e: "🛡️", c: "#94a3b8" },
        { n: "Маг Світла", p: 5, e: "✨", c: "#fde047" },
        { n: "Король", p: 4.5, e: "👑", c: "#f59e0b" },
        { n: "Дракон", p: 2, e: "🐉", c: "#ef4444" },
        { n: "Серце життя", p: 0.5, e: "❤️", c: "#ec4899" }
    ];

    const crystal = document.getElementById('main-crystal');
    crystal.addEventListener('pointerdown', (e) => {
        balance += level;
        xp++;
        if (xp >= level * 100) { level++; xp = 0; }
        
        const num = document.createElement('div');
        num.className = 'float-n';
        num.innerText = `+${level}`;
        num.style.left = e.clientX + 'px';
        num.style.top = e.clientY + 'px';
        document.body.appendChild(num);
        setTimeout(() => num.remove(), 800);
        
        updateUI();
        saveLocal();
    });

    function startRoll() {
        if (balance < 100) return alert("Мало монет!");
        balance -= 100;
        updateUI();

        const inner = document.getElementById('roulette-inner');
        inner.style.transition = 'none';
        inner.style.transform = 'translateX(0)';
        inner.innerHTML = '';

        let pool = [];
        for(let i=0; i<50; i++) {
            let rand = Math.random()*100, cur=0, item = items[0];
            for(let it of items){ cur+=it.p; if(rand<=cur){item=it; break;} }
            pool.push(item);
            inner.innerHTML += `<div class="item-box" style="border-color:${item.c}"><span>${item.e}</span><br>${item.n}</div>`;
        }

        const winIndex = 40; 
        const winItem = pool[winIndex];
        
        setTimeout(() => {
            inner.style.transition = 'transform 4s cubic-bezier(0.15, 0, 0.15, 1)';
            const move = (winIndex * 110) - (inner.parentElement.offsetWidth / 2) + 55;
            inner.style.transform = `translateX(-${move}px)`;
        }, 50);

        setTimeout(() => {
            if(winItem.n === "50 монет") {
                balance += 50;
            } else if(winItem.n !== "Нічого") {
                myCards[winItem.n] = (myCards[winItem.n] || 0) + 1;
            }
            updateUI();
            saveLocal();
            alert(`Випало: ${winItem.n} ${winItem.e}`);
        }, 4100);
    }

    function saveLocal() {
        localStorage.setItem('balance', balance);
        localStorage.setItem('level', level);
        localStorage.setItem('xp', xp);
        localStorage.setItem('myCards', JSON.stringify(myCards));
    }

    function updateUI() {
        document.getElementById('balance').innerText = balance;
        document.getElementById('level').innerText = level;

        const inv = document.getElementById('scr-cards');
        inv.innerHTML = '';
        for (let n in myCards) {
            let info = items.find(i => i.n === n);
            if(!info) continue;
            inv.innerHTML += `<div class="card">
                <div class="card-header" style="background:${info.c}">${n}</div>
                <div style="padding:15px; text-align:center;">
                    <div style="font-size:30px;">${info.e}</div>
                    <div style="font-size:12px; color:#8b949e;">К-сть: ${myCards[n]}</div>
                </div>
            </div>`;
        }
    }

    function show(id, btn) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('scr-' + id).classList.remove('hidden');
        btn.classList.add('active');
        updateUI();
    }

    updateUI();
</script>
</body>
</html>
